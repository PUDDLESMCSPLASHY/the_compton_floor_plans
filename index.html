<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Compton - Interactive Floor Plans</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #faf9f7;
            color: #2c3e50;
        }
        .header {
            text-align: center;
            padding: 25px 20px 15px;
            border-bottom: 1px solid #e2d9c8;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 400;
            color: #1a365d;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }
        .header p {
            color: #718096;
            font-style: italic;
            font-size: 0.9rem;
        }
        
        /* Floor Toggle */
        .floor-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #f7f5f2;
            border-bottom: 1px solid #e2d9c8;
        }
        .floor-btn {
            padding: 10px 30px;
            border: 2px solid #c9a227;
            background: white;
            color: #1a365d;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .floor-btn:hover { background: #faf5eb; }
        .floor-btn.active {
            background: #c9a227;
            color: white;
        }
        
        /* Main Layout */
        .main {
            display: flex;
            height: calc(100vh - 130px);
            position: relative;
        }
        
        /* Room List - Left Side */
        .room-list {
            width: 320px;
            overflow-y: auto;
            border-right: 1px solid #e2d9c8;
            background: white;
            padding: 15px;
        }
        .room-list h3 {
            font-size: 0.85rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 15px 0 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #e2d9c8;
        }
        .room-list h3:first-child { margin-top: 0; }
        .room-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            margin: 3px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .room-item:hover { background: #f7f5f2; }
        .room-item.selected { background: #c9a227; color: white; }
        .room-item.selected .room-type { color: white; opacity: 0.9; }
        .room-item.dimmed { opacity: 0.3; }
        .room-item.highlighted { background: #fef3c7; }
        .room-num {
            font-weight: 600;
            min-width: 35px;
        }
        .room-type {
            font-size: 0.8rem;
            color: #718096;
        }
        .room-item.suite .room-num { color: #2b6cb0; }
        .room-item.presidential .room-num { color: #805ad5; }
        .room-item.selected .room-num { color: white; }
        
        /* Floor Plan - Right Side */
        .floor-plan-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: #faf9f7;
        }
        .floor-plan {
            position: relative;
        }
        .floor-svg {
            display: block;
        }
        
        /* Room boxes in SVG */
        .room-box {
            fill: #f7f5f2;
            stroke: #c9a227;
            stroke-width: 1.5;
            cursor: pointer;
            transition: all 0.2s;
        }
        .room-box:hover {
            fill: #faf5eb;
            stroke-width: 2;
        }
        .room-box.selected {
            fill: #c9a227;
            stroke: #1a365d;
            stroke-width: 2;
        }
        .room-box.suite { fill: #e6f3ff; stroke: #3182ce; }
        .room-box.suite:hover { fill: #bee3f8; }
        .room-box.suite.selected { fill: #3182ce; }
        .room-box.presidential { fill: #faf5ff; stroke: #805ad5; }
        .room-box.presidential:hover { fill: #e9d8fd; }
        .room-box.presidential.selected { fill: #805ad5; }
        .room-box.dimmed { opacity: 0.2; }
        .room-box.highlighted { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
        .room-label { 
            font-family: 'Georgia', serif;
            font-size: 11px;
            fill: #2d3748;
            text-anchor: middle;
            pointer-events: none;
        }
        .room-label.dimmed { opacity: 0.2; }
        .room-box.selected + .room-label { fill: white; }
        
        .corridor {
            fill: none;
            stroke: #e2d9c8;
            stroke-width: 3;
            stroke-dasharray: 8 4;
        }
        
        .landmark-label {
            font-family: 'Georgia', serif;
            font-size: 12px;
            fill: #a0aec0;
            font-style: italic;
        }
        .landmark-arrow {
            stroke: #cbd5e0;
            stroke-width: 1.5;
            fill: none;
        }
        
        /* Filter Panel */
        .filter-tab {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #1a365d;
            color: white;
            padding: 15px 8px;
            border-radius: 8px 0 0 8px;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            z-index: 50;
            transition: all 0.2s;
        }
        .filter-tab:hover { background: #2d4a6f; padding-right: 12px; }
        .filter-tab.has-filters { background: #c9a227; }
        
        .filter-panel {
            position: absolute;
            right: -280px;
            top: 0;
            bottom: 0;
            width: 280px;
            background: white;
            border-left: 1px solid #e2d9c8;
            padding: 20px;
            overflow-y: auto;
            transition: right 0.3s ease;
            z-index: 40;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
        }
        .filter-panel.open { right: 0; }
        
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2d9c8;
        }
        .filter-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a365d;
        }
        .filter-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #a0aec0;
            line-height: 1;
        }
        .filter-close:hover { color: #1a365d; }
        
        .filter-section {
            margin-bottom: 20px;
        }
        .filter-section-title {
            font-size: 0.75rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filter-btn {
            padding: 6px 12px;
            border: 1.5px solid #e2d9c8;
            background: white;
            color: #4a5568;
            font-family: 'Georgia', serif;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            border-color: #c9a227;
            background: #faf5eb;
        }
        .filter-btn.active {
            background: #c9a227;
            border-color: #c9a227;
            color: white;
        }
        .filter-btn.ada {
            border-color: #68d391;
        }
        .filter-btn.ada.active {
            background: #48bb78;
            border-color: #48bb78;
        }
        
        .clear-filters {
            width: 100%;
            padding: 10px;
            border: 2px dashed #e2d9c8;
            background: transparent;
            color: #718096;
            font-family: 'Georgia', serif;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .clear-filters:hover {
            border-color: #c9a227;
            color: #c9a227;
        }
        
        .filter-count {
            text-align: center;
            padding: 12px;
            background: #f7f5f2;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #4a5568;
        }
        .filter-count strong {
            color: #c9a227;
        }
        
        /* Room Details Panel */
        .room-details {
            position: fixed;
            bottom: 20px;
            left: 340px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            min-width: 280px;
            display: none;
            z-index: 100;
        }
        .room-details.visible { display: block; }
        .room-details-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .room-details-num {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a365d;
        }
        .room-details-close {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #a0aec0;
        }
        .room-details-close:hover { color: #1a365d; }
        .room-details-type {
            color: #c9a227;
            font-weight: 500;
            margin-bottom: 3px;
        }
        .room-details-category {
            color: #718096;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .detail-box {
            background: #f7f5f2;
            padding: 8px 10px;
            border-radius: 6px;
        }
        .detail-label {
            font-size: 0.65rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .detail-value {
            font-size: 0.9rem;
            color: #2d3748;
            font-weight: 500;
        }
        .feature-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .feature-tag {
            background: #e6f3ff;
            color: #2b6cb0;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .feature-tag.ada { background: #c6f6d5; color: #276749; }
        .room-notes {
            margin-top: 10px;
            padding: 8px;
            background: #fffbeb;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #744210;
        }
        
        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            padding: 10px 20px;
            background: white;
            border-top: 1px solid #e2d9c8;
            justify-content: center;
            font-size: 0.8rem;
            color: #718096;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1.5px solid;
        }
        .legend-box.standard { background: #f7f5f2; border-color: #c9a227; }
        .legend-box.suite { background: #e6f3ff; border-color: #3182ce; }
        .legend-box.presidential { background: #faf5ff; border-color: #805ad5; }
    </style>
</head>
<body>
    <div class="header">
        <h1>THE COMPTON</h1>
        <p>Click any room to see details</p>
    </div>
    
    <div class="floor-toggle">
        <button class="floor-btn active" data-floor="4">Fourth Floor</button>
        <button class="floor-btn" data-floor="5">Fifth Floor</button>
        <button class="floor-btn" data-floor="6">Sixth Floor</button>
    </div>
    
    <div class="main">
        <div class="room-list" id="room-list"></div>
        <div class="floor-plan-container">
            <div class="floor-plan" id="floor-plan"></div>
        </div>
        
        <!-- Filter Tab -->
        <div class="filter-tab" id="filter-tab" onclick="toggleFilter()">Filter</div>
        
        <!-- Filter Panel -->
        <div class="filter-panel" id="filter-panel">
            <div class="filter-header">
                <span class="filter-title">Filter Rooms</span>
                <button class="filter-close" onclick="toggleFilter()">×</button>
            </div>
            
            <div class="filter-section">
                <div class="filter-section-title">View</div>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="city">City View</button>
                    <button class="filter-btn" data-filter="park">Park View</button>
                    <button class="filter-btn" data-filter="square">Square View</button>
                </div>
            </div>
            
            <div class="filter-section">
                <div class="filter-section-title">Features</div>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="corner">Corner Room</button>
                    <button class="filter-btn" data-filter="windowseat">Window Seat</button>
                    <button class="filter-btn" data-filter="tub">Soaking Tub</button>
                    <button class="filter-btn" data-filter="sofabed">Sofa Bed</button>
                    <button class="filter-btn" data-filter="adjoining">Adjoining</button>
                </div>
            </div>
            
            <div class="filter-section">
                <div class="filter-section-title">Location</div>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="elevator">Near Elevator</button>
                    <button class="filter-btn" data-filter="ice">Near Ice</button>
                    <button class="filter-btn" data-filter="stairs">Near Stairs</button>
                </div>
            </div>
            
            <div class="filter-section">
                <div class="filter-section-title">Room Type</div>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="suite">Suites</button>
                    <button class="filter-btn" data-filter="presidential">Presidential</button>
                    <button class="filter-btn" data-filter="twoqueens">Two Queens</button>
                </div>
            </div>
            
            <div class="filter-section">
                <div class="filter-section-title">Accessibility</div>
                <div class="filter-buttons">
                    <button class="filter-btn ada" data-filter="ada">ADA Accessible</button>
                </div>
            </div>
            
            <button class="clear-filters" onclick="clearFilters()">Clear All Filters</button>
            
            <div class="filter-count" id="filter-count"></div>
        </div>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-box standard"></div> Deluxe / Premium</div>
        <div class="legend-item"><div class="legend-box suite"></div> Studio / One Bedroom</div>
        <div class="legend-item"><div class="legend-box presidential"></div> Presidential</div>
    </div>
    
    <div class="room-details" id="room-details">
        <div class="room-details-header">
            <div>
                <div class="room-details-num" id="detail-num"></div>
                <div class="room-details-type" id="detail-type"></div>
                <div class="room-details-category" id="detail-category"></div>
            </div>
            <button class="room-details-close" onclick="closeDetails()">×</button>
        </div>
        <div class="detail-grid" id="detail-grid"></div>
        <div class="feature-tags" id="detail-features"></div>
        <div class="room-notes" id="detail-notes" style="display:none;"></div>
    </div>

            if (room['Room Category']?.includes('Suite')) return 'suite';
            return '';

        function roomMatchesFilters(roomNum) {
            if (activeFilters.size === 0) return null; // No filters = no highlighting
            const room = roomData[roomNum];
            if (!room) return false;
            
            // AND logic: room must match ALL active filters
            for (const filter of activeFilters) {
                let matches = false;
                switch(filter) {
                    case 'city': matches = room['City/Park'] === 'City'; break;
                    case 'park': matches = room['City/Park'] === 'Park'; break;
                    case 'square': matches = !!room['View of Square']; break;
                    case 'corner': matches = !!room['Corner']; break;
                    case 'windowseat': matches = room['Window Seat'] === 'Yes'; break;
                    case 'tub': matches = !!room['Tub']; break;
                    case 'sofabed': matches = !!room['Sofa Bed']; break;
                    case 'adjoining': matches = !!room['Adjoining']; break;
                    case 'elevator': matches = !!room['Elevator']; break;
                    case 'ice': matches = !!room['Ice']; break;
                    case 'stairs': matches = !!room['Stairs']; break;
                    case 'suite': matches = room['Room Category']?.includes('Suite') && !room['Room Category']?.includes('Presidential'); break;
                    case 'presidential': matches = room['Room Category']?.includes('Presidential'); break;
                    case 'twoqueens': matches = room['Room Type Name']?.includes('Queen'); break;
                    case 'ada': matches = !!room['ADA']; break;
                }
                if (!matches) return false; // If ANY filter doesn't match, room is out

            return true; // Only true if ALL filters matched

            svg += `<path class="corridor" d="M ${padding + 30} ${padding + H + 10} L ${padding + 380} ${padding + H + 10}"/>`;
            svg += `<path class="corridor" d="M ${padding + 420} ${padding + H + 10} L ${padding + 420} ${padding + H * 5 + 30}"/>`;
            svg += `<path class="corridor" d="M ${padding + 430} ${padding + H * 4 + 36} L ${padding + 580} ${padding + H * 4 + 36}"/>`;
            
            Object.entries(layout).forEach(([roomNum, [x, y, w, h]]) => {
                const cls = getRoomClass(roomNum);
                const sel = selectedRoom === roomNum ? ' selected' : '';
                const filterMatch = roomMatchesFilters(roomNum);
                const filterClass = filterMatch === null ? '' : (filterMatch ? ' highlighted' : ' dimmed');
                svg += `<rect class="room-box ${cls}${sel}${filterClass}" data-room="${roomNum}" x="${x + padding}" y="${y + padding}" width="${w}" height="${h}" rx="3"/>`;
                svg += `<text class="room-label${filterClass}" x="${x + padding + w/2}" y="${y + padding + h/2 + 4}">${roomNum}</text>`;
            });
            
            svg += '</svg>';
            document.getElementById('floor-plan').innerHTML = svg;
            
            document.querySelectorAll('.room-box').forEach(el => {
                el.addEventListener('click', () => selectRoom(el.dataset.room));
            });
        }
        
        function selectRoom(roomNum) {
            selectedRoom = roomNum;
            renderRoomList();
            renderFloorPlan();
            showDetails(roomNum);
        }
        
        function showDetails(roomNum) {
            const room = roomData[roomNum];
            if (!room) return;
            
            document.getElementById('detail-num').textContent = `Room ${roomNum}`;
            document.getElementById('detail-type').textContent = room['Room Type Name'] || '';
            document.getElementById('detail-category').textContent = room['Room Category'] || '';
            
            let gridHTML = '';
            if (room['SF']) gridHTML += `<div class="detail-box"><div class="detail-label">Size</div><div class="detail-value">${room['SF']} sq ft</div></div>`;
            gridHTML += `<div class="detail-box"><div class="detail-label">View</div><div class="detail-value">${room['View Direction'] || '—'}</div></div>`;
            gridHTML += `<div class="detail-box"><div class="detail-label">Overlooks</div><div class="detail-value">${room['City/Park'] || '—'}</div></div>`;
            gridHTML += `<div class="detail-box"><div class="detail-label">Window Seat</div><div class="detail-value">${room['Window Seat'] || '—'}</div></div>`;
            document.getElementById('detail-grid').innerHTML = gridHTML;
            
            let features = [];
            if (room['Corner']) features.push('Corner');
            if (room['Ice']) features.push('Near Ice');
            if (room['Elevator']) features.push('Near Elevator');
            if (room['Stairs']) features.push('Near Stairs');
            if (room['Tub']) features.push('Soaking Tub');
            if (room['Sofa Bed']) features.push('Sofa Bed');
            if (room['View of Square']) features.push('Square View');
            if (room['Adjoining']) features.push('Adjoining');
            if (room['ADA']) features.push({ text: 'ADA', ada: true });
            
            document.getElementById('detail-features').innerHTML = features.map(f => {
                if (typeof f === 'object') return `<span class="feature-tag ada">${f.text}</span>`;
                return `<span class="feature-tag">${f}</span>`;
            }).join('');
            
            const notesEl = document.getElementById('detail-notes');
            if (room['Notes']) {
                notesEl.textContent = room['Notes'];
                notesEl.style.display = 'block';
            } else {
                notesEl.style.display = 'none';
            }
            
            document.getElementById('room-details').classList.add('visible');
        }
        
        function closeDetails() {
            selectedRoom = null;
            document.getElementById('room-details').classList.remove('visible');
            renderRoomList();
            renderFloorPlan();
        }
        
        function toggleFilter() {
            filterPanelOpen = !filterPanelOpen;
            document.getElementById('filter-panel').classList.toggle('open', filterPanelOpen);
            if (filterPanelOpen) {
                document.getElementById('filter-tab').style.display = 'none';
            } else {
                document.getElementById('filter-tab').style.display = 'block';
            }
        }
        
        function updateFilterCount() {
            const countEl = document.getElementById('filter-count');
            if (activeFilters.size === 0) {
                countEl.innerHTML = '';
            } else {
                const count = getMatchingRoomCount();
                const total = Object.keys(roomData).filter(r => r.startsWith(currentFloor)).length;
                countEl.innerHTML = `<strong>${count}</strong> of ${total} rooms match`;
            }
            
            // Update tab indicator
            document.getElementById('filter-tab').classList.toggle('has-filters', activeFilters.size > 0);
        }
        
        function clearFilters() {
            activeFilters.clear();
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            updateFilterCount();
            renderRoomList();
            renderFloorPlan();
        }
        
        // Filter button handlers
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.dataset.filter;
                if (activeFilters.has(filter)) {
                    activeFilters.delete(filter);
                    btn.classList.remove('active');
                } else {
                    activeFilters.add(filter);
                    btn.classList.add('active');
                }
                updateFilterCount();
                renderRoomList();
                renderFloorPlan();
            });
        });
        
        // Floor toggle
        document.querySelectorAll('.floor-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFloor = parseInt(btn.dataset.floor);
                selectedRoom = null;
                closeDetails();
                updateFilterCount();
                renderRoomList();
                renderFloorPlan();
            });
        });
        
        // Close filter panel when clicking on floor plan area
        document.querySelector('.floor-plan-container').addEventListener('click', (e) => {
            if (filterPanelOpen && !e.target.closest('.filter-panel')) {
                toggleFilter();
            }
        });
        
        // Initial render
        renderRoomList();
        renderFloorPlan();
    </script>
</body>
</html>
