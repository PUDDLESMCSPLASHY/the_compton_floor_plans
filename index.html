<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Compton - Interactive Floor Plans</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #faf9f7;
            color: #2c3e50;
        }
        .header {
            text-align: center;
            padding: 25px 20px 15px;
            border-bottom: 1px solid #e2d9c8;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 400;
            color: #1a365d;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }
        .header p {
            color: #718096;
            font-style: italic;
            font-size: 0.9rem;
        }
        
        /* Floor Toggle */
        .floor-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #f7f5f2;
            border-bottom: 1px solid #e2d9c8;
        }
        .floor-btn {
            padding: 10px 30px;
            border: 2px solid #c9a227;
            background: white;
            color: #1a365d;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .floor-btn:hover { background: #faf5eb; }
        .floor-btn.active {
            background: #c9a227;
            color: white;
        }
        
        /* Main Layout */
        .main {
            display: flex;
            height: calc(100vh - 130px);
        }
        
        /* Room List - Left Side */
        .room-list {
            width: 320px;
            overflow-y: auto;
            border-right: 1px solid #e2d9c8;
            background: white;
            padding: 15px;
        }
        .room-list h3 {
            font-size: 0.85rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 15px 0 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #e2d9c8;
        }
        .room-list h3:first-child { margin-top: 0; }
        .room-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            margin: 3px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .room-item:hover { background: #f7f5f2; }
        .room-item.selected { background: #c9a227; color: white; }
        .room-item.selected .room-type { color: white; opacity: 0.9; }
        .room-num {
            font-weight: 600;
            min-width: 35px;
        }
        .room-type {
            font-size: 0.8rem;
            color: #718096;
        }
        .room-item.suite .room-num { color: #2b6cb0; }
        .room-item.presidential .room-num { color: #805ad5; }
        .room-item.selected .room-num { color: white; }
        
        /* Floor Plan - Right Side */
        .floor-plan-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: #faf9f7;
        }
        .floor-plan {
            position: relative;
            /* Scale will be applied dynamically */
        }
        .floor-svg {
            display: block;
        }
        
        /* Room boxes in SVG */
        .room-box {
            fill: #f7f5f2;
            stroke: #c9a227;
            stroke-width: 1.5;
            cursor: pointer;
            transition: all 0.2s;
        }
        .room-box:hover {
            fill: #faf5eb;
            stroke-width: 2;
        }
        .room-box.selected {
            fill: #c9a227;
            stroke: #1a365d;
            stroke-width: 2;
        }
        .room-box.suite { fill: #e6f3ff; stroke: #3182ce; }
        .room-box.suite:hover { fill: #bee3f8; }
        .room-box.suite.selected { fill: #3182ce; }
        .room-box.presidential { fill: #faf5ff; stroke: #805ad5; }
        .room-box.presidential:hover { fill: #e9d8fd; }
        .room-box.presidential.selected { fill: #805ad5; }
        
        .room-label {
            font-family: 'Georgia', serif;
            font-size: 11px;
            fill: #2d3748;
            text-anchor: middle;
            pointer-events: none;
        }
        .room-box.selected + .room-label { fill: white; }
        
        .corridor {
            fill: none;
            stroke: #e2d9c8;
            stroke-width: 3;
            stroke-dasharray: 8 4;
        }
        
        /* Room Details Panel */
        .room-details {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            min-width: 280px;
            display: none;
            z-index: 100;
        }
        .room-details.visible { display: block; }
        .room-details-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .room-details-num {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a365d;
        }
        .room-details-close {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #a0aec0;
        }
        .room-details-close:hover { color: #1a365d; }
        .room-details-type {
            color: #c9a227;
            font-weight: 500;
            margin-bottom: 3px;
        }
        .room-details-category {
            color: #718096;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .detail-box {
            background: #f7f5f2;
            padding: 8px 10px;
            border-radius: 6px;
        }
        .detail-label {
            font-size: 0.65rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .detail-value {
            font-size: 0.9rem;
            color: #2d3748;
            font-weight: 500;
        }
        .feature-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .feature-tag {
            background: #e6f3ff;
            color: #2b6cb0;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .feature-tag.ada { background: #c6f6d5; color: #276749; }
        .room-notes {
            margin-top: 10px;
            padding: 8px;
            background: #fffbeb;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #744210;
        }
        
        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            padding: 10px 20px;
            background: white;
            border-top: 1px solid #e2d9c8;
            justify-content: center;
            font-size: 0.8rem;
            color: #718096;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1.5px solid;
        }
        .legend-box.standard { background: #f7f5f2; border-color: #c9a227; }
        .legend-box.suite { background: #e6f3ff; border-color: #3182ce; }
        .legend-box.presidential { background: #faf5ff; border-color: #805ad5; }
    </style>
</head>
<body>
    <div class="header">
        <h1>THE COMPTON</h1>
        <p>Click any room to see details</p>
    </div>
    
    <div class="floor-toggle">
        <button class="floor-btn active" data-floor="4">Fourth Floor</button>
        <button class="floor-btn" data-floor="5">Fifth Floor</button>
        <button class="floor-btn" data-floor="6">Sixth Floor</button>
    </div>
    
    <div class="main">
        <div class="room-list" id="room-list"></div>
        <div class="floor-plan-container">
            <div class="floor-plan" id="floor-plan"></div>
        </div>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-box standard"></div> Deluxe / Premium</div>
        <div class="legend-item"><div class="legend-box suite"></div> Studio / One Bedroom</div>
        <div class="legend-item"><div class="legend-box presidential"></div> Presidential</div>
    </div>
    
    <div class="room-details" id="room-details">
        <div class="room-details-header">
            <div>
                <div class="room-details-num" id="detail-num"></div>
                <div class="room-details-type" id="detail-type"></div>
                <div class="room-details-category" id="detail-category"></div>
            </div>
            <button class="room-details-close" onclick="closeDetails()">×</button>
        </div>
        <div class="detail-grid" id="detail-grid"></div>
        <div class="feature-tags" id="detail-features"></div>
        <div class="room-notes" id="detail-notes" style="display:none;"></div>
    </div>

East/North","Corner":"Corner","City/Park":"Park","1/2 Sinks":"2","Window Seat":"No","Notes":"Adjoining with 644, Powder Room"},"647":{"Room Number":"647","Code":"SPK","Room Category":"One Bedroom Suites","SF":"510","Room Type Name":"One Bedroom Suite King","View Direction":"West/North","Corner":"Corner","City/Park":"City","1/2 Sinks":"2","Tub":"Yes","Window Seat":"Yes","Sofa Bed":"Yes"}};

        // Floor layout positions (based on architectural plans)
        // Coordinates are: [x, y, width, height]
        const W = 44, H = 32; // Standard room size
        const WL = 56; // Wide room (suites)
        const WP = 70; // Presidential width
        
        const floorLayouts = {
            4: {
                // West Wing - North side (facing west/city) - top row
                '401': [0, 0, WL, H],      // Corner suite
                '403': [WL+4, 0, W, H],    // After stair gap
                '407': [WL+W+8+30, 0, W, H],  // Skip stair
                '409': [WL+W*2+12+30, 0, W, H],
                '411': [WL+W*3+16+30, 0, W, H],
                '413': [WL+W*4+20+30, 0, W, H],
                '415': [WL+W*5+24+30, 0, W, H],
                '417': [WL+W*6+28+30, 0, W, H],
                '419': [WL+W*7+32+30, 0, W, H],
                '421': [WL+W*8+36+30, 0, WL, H], // Corner suite
                
                // West Wing - South side (facing east/park) - bottom of west wing
                '402': [0, H+20, W, H],
                '404': [W+4, H+20, W, H],
                '406': [W*2+8+30, H+20, W, H],
                '408': [W*3+12+30, H+20, W, H],
                '410': [W*4+16+30, H+20, W, H],
                '412': [W*5+20+30, H+20, W, H],
                '414': [W*6+24+30, H+20, W, H],
                
                // East Wing - North side (facing north/square)
                '423': [WL+W*8+36+30+WL+10, 0, W, H],
                '425': [WL+W*8+36+30+WL+W+14, 0, W, H],
                '427': [WL+W*8+36+30+WL+W*2+18, 0, W, H],
                
                // East Wing - South side (starts the vertical drop)
                '426': [WL+W*8+36+30+WL+10, H+20, W, H],
                '428': [WL+W*8+36+30+WL+10, H*2+24, W, H],
                '430': [WL+W*8+36+30+WL+10, H*3+28, W, H],
                '432': [WL+W*8+36+30+WL+10, H*4+32, W, H],
                '434': [WL+W*8+36+30+WL+10, H*5+36, W, H], // Corner
                
                // Southeast extension - South row (facing east/park)
                '436': [WL+W*8+36+30+WL+W+14, H*5+36, W, H],
                '438': [WL+W*8+36+30+WL+W*2+18, H*5+36, W, H],
                '440': [WL+W*8+36+30+WL+W*3+22, H*5+36, W, H],
                '442': [WL+W*8+36+30+WL+W*4+26, H*5+36, W, H],
                '444': [WL+W*8+36+30+WL+W*5+30, H*5+36, W, H],
                '446': [WL+W*8+36+30+WL+W*6+34, H*5+36, WP, H], // Presidential
                
                // Southeast extension - North row (facing west/city)
                '443': [WL+W*8+36+30+WL+W*3+22, H*4+32, WL, H],
                '445': [WL+W*8+36+30+WL+W*4+26+12, H*4+32, W, H],
                '447': [WL+W*8+36+30+WL+W*5+30+12, H*4+32, WL, H], // Corner suite
            }
        };
        
        // Generate floors 5 and 6 from floor 4 template
        [5, 6].forEach(floor => {
            floorLayouts[floor] = {};
            Object.entries(floorLayouts[4]).forEach(([room, coords]) => {
                const newRoom = String(floor) + room.slice(1);
                floorLayouts[floor][newRoom] = [...coords];
            });
        });
        
        let currentFloor = 4;
        let selectedRoom = null;
        
        function getRoomClass(roomNum) {
            const room = roomData[roomNum];
            if (!room) return '';
            if (room['Room Category']?.includes('Presidential')) return 'presidential';
            if (room['Room Category']?.includes('Suite')) return 'suite';
            return '';
        }
        
        function renderRoomList() {
            const container = document.getElementById('room-list');
            const floorRooms = Object.keys(roomData).filter(r => r.startsWith(currentFloor));
            
            // Group by wing
            const westNorth = floorRooms.filter(r => ['01','03','07','09','11','13','15','17','19','21'].some(s => r.endsWith(s)) && parseInt(r) < currentFloor * 100 + 30);
            const westSouth = floorRooms.filter(r => ['02','04','06','08','10','12','14'].some(s => r.endsWith(s)) && parseInt(r) < currentFloor * 100 + 20);
            const eastWing = floorRooms.filter(r => parseInt(r) >= currentFloor * 100 + 23 && parseInt(r) <= currentFloor * 100 + 35);
            const southEast = floorRooms.filter(r => parseInt(r) >= currentFloor * 100 + 36);
            
            let html = '<h3>West Wing — City View</h3>';
            westNorth.forEach(r => {
                const room = roomData[r];
                const cls = getRoomClass(r);
                const sel = selectedRoom === r ? ' selected' : '';
                html += `<div class="room-item ${cls}${sel}" data-room="${r}">
                    <span class="room-num">${r}</span>
                    <span class="room-type">${room?.['Room Type Name'] || ''}</span>
                </div>`;
            });
            
            html += '<h3>West Wing — Park View</h3>';
            westSouth.forEach(r => {
                const room = roomData[r];
                const cls = getRoomClass(r);
                const sel = selectedRoom === r ? ' selected' : '';
                html += `<div class="room-item ${cls}${sel}" data-room="${r}">
                    <span class="room-num">${r}</span>
                    <span class="room-type">${room?.['Room Type Name'] || ''}</span>
                </div>`;
            });
            
            html += '<h3>East Wing</h3>';
            eastWing.forEach(r => {
                const room = roomData[r];
                const cls = getRoomClass(r);
                const sel = selectedRoom === r ? ' selected' : '';
                html += `<div class="room-item ${cls}${sel}" data-room="${r}">
                    <span class="room-num">${r}</span>
                    <span class="room-type">${room?.['Room Type Name'] || ''}</span>
                </div>`;
            });
            
            html += '<h3>Southeast Wing</h3>';
            southEast.forEach(r => {
                const room = roomData[r];
                const cls = getRoomClass(r);
                const sel = selectedRoom === r ? ' selected' : '';
                html += `<div class="room-item ${cls}${sel}" data-room="${r}">
                    <span class="room-num">${r}</span>
                    <span class="room-type">${room?.['Room Type Name'] || ''}</span>
                </div>`;
            });
            
            container.innerHTML = html;
            
            // Add click handlers
            container.querySelectorAll('.room-item').forEach(el => {
                el.addEventListener('click', () => selectRoom(el.dataset.room));
            });
        }
        
        function renderFloorPlan() {
            const layout = floorLayouts[currentFloor];
            if (!layout) return;
            
            // Calculate bounds
            let maxX = 0, maxY = 0;
            Object.values(layout).forEach(([x, y, w, h]) => {
                maxX = Math.max(maxX, x + w);
                maxY = Math.max(maxY, y + h);
            });
            
            const padding = 20;
            const svgW = maxX + padding * 2;
            const svgH = maxY + padding * 2;
            
            let svg = `<svg class="floor-svg" viewBox="0 0 ${svgW} ${svgH}" width="${svgW}" height="${svgH}">`;
            
            // Draw corridor lines
            svg += `<path class="corridor" d="M ${padding + 30} ${padding + H + 10} L ${padding + 380} ${padding + H + 10}"/>`;
            svg += `<path class="corridor" d="M ${padding + 420} ${padding + H + 10} L ${padding + 420} ${padding + H * 5 + 30}"/>`;
            svg += `<path class="corridor" d="M ${padding + 430} ${padding + H * 4 + 36} L ${padding + 580} ${padding + H * 4 + 36}"/>`;
            
            // Draw rooms
            Object.entries(layout).forEach(([roomNum, [x, y, w, h]]) => {
                const cls = getRoomClass(roomNum);
                const sel = selectedRoom === roomNum ? ' selected' : '';
                svg += `<rect class="room-box ${cls}${sel}" data-room="${roomNum}" x="${x + padding}" y="${y + padding}" width="${w}" height="${h}" rx="3"/>`;
                svg += `<text class="room-label" x="${x + padding + w/2}" y="${y + padding + h/2 + 4}">${roomNum}</text>`;
            });
            
            svg += '</svg>';
            document.getElementById('floor-plan').innerHTML = svg;
            
            // Add click handlers
            document.querySelectorAll('.room-box').forEach(el => {
                el.addEventListener('click', () => selectRoom(el.dataset.room));
            });
        }
        
        function selectRoom(roomNum) {
            selectedRoom = roomNum;
            renderRoomList();
            renderFloorPlan();
            showDetails(roomNum);
        }
        
        function showDetails(roomNum) {
            const room = roomData[roomNum];
            if (!room) return;
            
            document.getElementById('detail-num').textContent = `Room ${roomNum}`;
            document.getElementById('detail-type').textContent = room['Room Type Name'] || '';
            document.getElementById('detail-category').textContent = room['Room Category'] || '';
            
            let gridHTML = '';
            if (room['SF']) gridHTML += `<div class="detail-box"><div class="detail-label">Size</div><div class="detail-value">${room['SF']} sq ft</div></div>`;
            gridHTML += `<div class="detail-box"><div class="detail-label">View</div><div class="detail-value">${room['View Direction'] || '—'}</div></div>`;
            gridHTML += `<div class="detail-box"><div class="detail-label">Overlooks</div><div class="detail-value">${room['City/Park'] || '—'}</div></div>`;
            gridHTML += `<div class="detail-box"><div class="detail-label">Window Seat</div><div class="detail-value">${room['Window Seat'] || '—'}</div></div>`;
            document.getElementById('detail-grid').innerHTML = gridHTML;
            
            let features = [];
            if (room['Corner']) features.push('Corner');
            if (room['Ice']) features.push('Near Ice');
            if (room['Elevator']) features.push('Near Elevator');
            if (room['Stairs']) features.push('Near Stairs');
            if (room['Tub']) features.push('Soaking Tub');
            if (room['Sofa Bed']) features.push('Sofa Bed');
            if (room['View of Square']) features.push('Square View');
            if (room['Adjoining']) features.push('Adjoining');
            if (room['ADA']) features.push({ text: 'ADA', ada: true });
            
            document.getElementById('detail-features').innerHTML = features.map(f => {
                if (typeof f === 'object') return `<span class="feature-tag ada">${f.text}</span>`;
                return `<span class="feature-tag">${f}</span>`;
            }).join('');
            
            const notesEl = document.getElementById('detail-notes');
            if (room['Notes']) {
                notesEl.textContent = room['Notes'];
                notesEl.style.display = 'block';
            } else {
                notesEl.style.display = 'none';
            }
            
            document.getElementById('room-details').classList.add('visible');
        }
        
        function closeDetails() {
            selectedRoom = null;
            document.getElementById('room-details').classList.remove('visible');
            renderRoomList();
            renderFloorPlan();
        }
        
        // Floor toggle
        document.querySelectorAll('.floor-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFloor = parseInt(btn.dataset.floor);
                selectedRoom = null;
                closeDetails();
                renderRoomList();
                renderFloorPlan();
            });
        });
        
        // Initial render
        renderRoomList();
        renderFloorPlan();
    </script>
